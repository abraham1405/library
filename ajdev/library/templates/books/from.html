<form enctype="multipart/form-data" method="post" class="card shadow p-4">

    {% csrf_token %}
    {% for field in formulary %}
    <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>

        {% if field.field.widget.input_type == 'file' %}
            {% if field.value %}
                <div class="mb-2">
                    <p class="small text-muted mb-1">Current {{ field.label|lower }}:</p>
                    <img src="{{ field.value.url }}" width="100px" alt="Current {{ field.label|lower }}" class="img-thumbnail">
                </div>
            {% endif %}
            <input type="file" 
                class="form-control" 
                id="{{ field.id_for_label }}" 
                name="{{ field.name }}" 
                {% if not field.value %}required{% endif %}>

        {% else %}
            <input type="{{ field.field.widget.input_type }}" 
                class="form-control" 
                id="{{ field.id_for_label }}" 
                name="{{ field.name }}" 
                placeholder="Enter the book's {{ field.label|lower }}" 
                value="{{ field.value|default_if_none:'' }}"
                {% if field.field.required %}required{% endif %}>
        {% endif %}
        
        {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
        {% endif %}
    </div>
    {% endfor %}

    <div class="d-flex justify-content-end gap-2">
        <a href="{% url 'books' %}" class="btn btn-secondary">
            Cancel
        </a>
        <button type="submit" class="btn btn-success">
            Save Book
        </button>
    </div>

</form>
