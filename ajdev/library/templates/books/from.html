<form enctype="multipart/form-data" method="post" class="card shadow p-4">

    {% csrf_token %}

    <div class="mb-3">
        <label for="titulo" class="form-label">Título</label>
        <input type="text" 
               class="form-control" 
               id="titulo" 
               name="titulo" 
               placeholder="Ingrese el título del libro" 
               required>
    </div>

    <div class="mb-3">
        <label for="imagen" class="form-label">Imagen</label>
        <input type="file" 
               class="form-control" 
               id="imagen" 
               name="imagen" 
               accept="image/*">
    </div>

    <div class="mb-3">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea class="form-control" 
                  id="descripcion" 
                  name="descripcion" 
                  rows="4" 
                  placeholder="Ingrese una descripción del libro"
                  required></textarea>
    </div>

    <div class="d-flex justify-content-end gap-2">
        <a href="{% url 'books' %}" class="btn btn-secondary">
            Cancelar
        </a>
        <button type="submit" class="btn btn-success">
            Guardar Libro
        </button>
    </div>

</form>
